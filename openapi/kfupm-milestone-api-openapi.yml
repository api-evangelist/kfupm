          enum:
          - ACADEMIC
          - ADMINISTRATIVE
        documents:
          type: array
          description: A collection of documents related to the milestone.
          nullable: true
          items:
            $ref: '#/components/schemas/MilestoneDocument'
        responsibleUsers:
          type: array
          description: 'The specific users chosen to be responsible for the content.

            When milestone type is ''Academic'', responsible user can be one of the associated academic, that have a role on the content, that matches the responsible role.

            When the type is ''Administrative'', responsible user must have an administrator role, that matches the selected role.

            When the milestone role is an editor role, the selected user must have an editorial role that matches the owner or related organizations of the milestone.'
          items:
