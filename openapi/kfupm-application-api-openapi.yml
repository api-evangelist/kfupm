          type: string
          description: The title of the application cluster.
          readOnly: true
        containedApplications:
          type: array
          description: The applications grouped in the application cluster. Applications are automatically added when related to other applications in this cluster.
          readOnly: true
          items:
            $ref: '#/components/schemas/ApplicationRef'
        project:
          $ref: '#/components/schemas/ProjectRef'
        status:
          type: string
          description: Application cluster status value
          readOnly: true
          enum:
          - PENDING
          - AWARDED
          - REJECTED
        dateOfStatusChange:
          type: string
          description: The date of the last status change of the application cluster.
          format: date
          readOnly: true
        systemName:
          type: string
          description: The content system name
          readOnly: true
      description: An application cluster groups related applications from their individual relations.
    FormattedLocalizedString:
      type: object
      additionalProperties:
        type: string
        description: A set of localized strings that support formatting. Invalid locale values will be ignored.
        nullable: true
        example: '{"en_GB":"Some text"}'
      description: A set of localized strings that support formatting. Invalid locale values will be ignored.
      nullable: true
      example:
        en_GB: Some text
    SystemCurrencyAmount:
      required:
      - value
      type: object
      properties:
        currency:
          type: string
          description: 'An ISO-4217 3-letter alphabetic code representing the Pure installation''s system currency as defined by the W3C''s Payment Request standard: https://www.w3.org/TR/payment-request/#dom-paymentcurrencyamount-currency'
          readOnly: true
        value:
          type: string
          description: 'A valid decimal monetary value as defined by the W3C''s Payment Request standard: https://www.w3.org/TR/payment-request/#dom-paymentcurrencyamount-value'
          format: ^-?[0-9]+(\.[0-9]+)?$
      description: 'A monetary value in the Pure installation''s system currency as defined by the W3C''s Payment Request standard: https://www.w3.org/TR/payment-request/#paymentcurrencyamount-dictionary'
    ClassificationRefList:
      type: object
      properties:
        classifications:
          type: array
          items:
            $ref: '#/components/schemas/ClassificationRef'
      description: List of classification references
    ApplicationBudget:
      required:
      - visibility
      type: object
      properties:
        pureId:
          type: integer
          description: Pure database ID of the object, prefer using the UUID if it is present on the entity
          format: int64
          readOnly: true
        budgets:
          type: array
          description: Individual entries of the budget.
          nullable: true
          items:
            $ref: '#/components/schemas/ApplicationFundingBudgetAssociation'
        visibility:
          $ref: '#/components/schemas/Visibility'
      description: A budget for an application.
    ClassificationSchemeRef:
      required:
      - uuid
      type: object
      description: A reference to a classification scheme
      nullable: true
