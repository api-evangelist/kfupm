          description: The specification of the budget.
          nullable: true
        yearlyBudgets:
          type: array
          description: Yearly budgets of the account.
          nullable: true
          items:
            $ref: '#/components/schemas/YearlyBudget'
      description: An account of a budget.
    ApplicationRef:
      required:
      - uuid
      type: object
      description: A reference to an application
