          description: Pure database ID of the object, prefer using the UUID if it is present on the entity
          format: int64
          readOnly: true
        budgets:
          type: array
          description: Individual entries of the budget.
          nullable: true
          items:
            $ref: '#/components/schemas/AwardFundingBudgetAssociation'
        visibility:
          $ref: '#/components/schemas/Visibility'
      description: A budget for an award.
    Milestone:
      required:
      - milestoneType
      - title
      type: object
      properties:
        pureId:
          type: integer
          description: Pure database ID of the object, prefer using the UUID if it is present on the entity
          format: int64
          readOnly: true
        uuid:
          type: string
          description: UUID, this is the primary identity of the entity
          format: uuid
          readOnly: true
        createdBy:
          type: string
          description: Username of creator
          readOnly: true
        createdDate:
          type: string
          description: Date and time of creation
          format: date-time
          readOnly: true
        modifiedBy:
          type: string
          description: Username of the user that performed a modification
          readOnly: true
        modifiedDate:
          type: string
          description: Date and time of last modification
          format: date-time
          readOnly: true
        portalUrl:
          type: string
          description: URL of the content on the Pure Portal
          readOnly: true
        prettyUrlIdentifiers:
          type: array
          description: All pretty URLs
          readOnly: true
          items:
            type: string
            description: All pretty URLs
            readOnly: true
        previousUuids:
          type: array
          description: UUIDs of other content items which have been merged into this content item (or similar)
          readOnly: true
          items:
            type: string
            description: UUIDs of other content items which have been merged into this content item (or similar)
            readOnly: true
        version:
          type: string
          description: Used to guard against conflicting updates. For new content this is null, and for existing content the current value. The property should never be modified by a client, except in the rare case where the client wants to perform an update irrespective of if other clients have made updates in the meantime, also known as a "dirty write". A dirty write is performed by not including the property value or setting the property to null
          nullable: true
        deadline:
          type: string
          description: The deadline date of the milestone.
          format: date
          nullable: true
        completionState:
          $ref: '#/components/schemas/ClassificationRef'
        completedDate:
          type: string
          description: The date when the milestone was completed. This can only be set when 'completionState' property value is 'completed'
          format: date
          nullable: true
        award:
          $ref: '#/components/schemas/AwardRef'
        application:
          $ref: '#/components/schemas/ApplicationRef'
        project:
          $ref: '#/components/schemas/ProjectRef'
        ethicalReview:
          $ref: '#/components/schemas/EthicalReviewRef'
        contract:
          $ref: '#/components/schemas/ContractRef'
        completedBy:
          $ref: '#/components/schemas/UserRef'
        title:
          $ref: '#/components/schemas/LocalizedString'
        reminders:
          type: array
          description: List of reminders
          items:
            $ref: '#/components/schemas/MilestoneReminder'
        administrativeRole:
          type: string
          description: The user role for the milestone for administrative milestones
          nullable: true
        academicRole:
          $ref: '#/components/schemas/ClassificationRef'
        description:
          $ref: '#/components/schemas/FormattedLocalizedString'
        category:
          $ref: '#/components/schemas/ClassificationRef'
        milestoneType:
          type: string
          description: Selected milestone type. Based on the value used for 'milestoneType', it is mandatory to fill either 'academicRole' or 'administrativeRole' property as well.
          enum:
          - ACADEMIC
          - ADMINISTRATIVE
        documents:
          type: array
          description: A collection of documents related to the milestone.
          nullable: true
          items:
            $ref: '#/components/schemas/MilestoneDocument'
        responsibleUsers:
          type: array
          description: 'The specific users chosen to be responsible for the content.

            When milestone type is ''Academic'', responsible user can be one of the associated academic, that have a role on the content, that matches the responsible role.

            When the type is ''Administrative'', responsible user must have an administrator role, that matches the selected role.

            When the milestone role is an editor role, the selected user must have an editorial role that matches the owner or related organizations of the milestone.'
          items:
            $ref: '#/components/schemas/UserRef'
        identifiers:
          type: array
          description: Identifiers related to the milestone.
          nullable: true
          items:
            $ref: '#/components/schemas/Identifier'
        systemName:
          type: string
          description: The content system name
          readOnly: true
      description: A milestone.
    EthicalReviewRef:
      required:
      - uuid
      type: object
      description: A reference to an ethical review
      nullable: true
      allOf:
      - $ref: '#/components/schemas/ContentRef'
  securitySchemes:
    api-key:
      type: apiKey
      description: Security mechanism for the API
      name: api-key
      in: header
